name: Internship Alert

on:
  schedule:
    - cron: '0 * * * *'   # every hour
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm install

      - run: ./node_modules/.bin/tsx src/index.ts
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          INTERNSHIP_MODE: "true"

      - name: Commit updated seen_intern_jobs.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add seen_intern_jobs.json
          git diff --staged --quiet || git commit -m "chore: update seen intern jobs"
          git push